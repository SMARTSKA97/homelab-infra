services:
  broker:
    image: docker.io/library/redis:7
    restart: unless-stopped

  db:
    image: docker.io/library/postgres:16
    restart: unless-stopped
    volumes:
      - /mnt/storagepool/config/paperless/db:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=paperless
      - POSTGRES_USER=paperless
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

  webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    depends_on:
      - db
      - broker
    ports:
      - "8010:8000"
    volumes:
      - /mnt/storagepool/config/paperless/data:/usr/src/paperless/data
      - /mnt/storagepool/config/paperless/media:/usr/src/paperless/media
      - /mnt/storagepool/config/paperless/export:/usr/src/paperless/export
      - /mnt/storagepool/media/documents/consume:/usr/src/paperless/consume
    environment:
      - PAPERLESS_REDIS=redis://broker:6379
      - PAPERLESS_DBHOST=db
      - PAPERLESS_DBPASS=${PAPERLESS_DBPASS}
      - PAPERLESS_OCR_LANGUAGE=eng
      - USER_ID=1000
      - GROUP_ID=1000
      - PAPERLESS_URL=https://paperless.ska97homelab.uk
